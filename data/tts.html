<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>obs-live-hub TTS</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    }
  </style>
</head>
<body>
  <div id="tts-unlock" style="
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:9999;background:rgba(30,30,30,0.95);color:#fff;
    padding:16px 32px;border-radius:10px;
    font-size:18px;cursor:pointer;
    border:1px solid rgba(255,255,255,0.25);
    white-space:nowrap;
  " onclick="(function(el){
    try{var u=new SpeechSynthesisUtterance('');u.volume=0;window.speechSynthesis.speak(u);}catch(e){}
    el.style.display='none';
    document.getElementById('tts-active').style.display='block';
  })(this)">&#9654; クリックして音声を有効化</div>

  <div id="tts-active" style="
    display:none;position:fixed;top:8px;right:8px;
    z-index:9999;background:rgba(0,120,0,0.85);color:#fff;
    padding:4px 12px;border-radius:4px;font-size:11px;
  ">音声有効 ✓</div>

  <script>
    var WS_PORT = 8765;

    var ttsEngine    = 'webspeech';
    var aivisUrl     = 'http://localhost:10101';
    var aivisStyleId = 0;
    var bouyomiVoice = 0; // 棒読みちゃん voice番号（配信者設定）

    var ttsSettings = {
      enabled: false,
      volume: 1.0,
      rate: 1.0,
      pitch: 1.0,
      readUsername: true,
      maxLength: 100,
      twitch: true,
      youtube: true
    };

    var ttsQueue      = [];
    var ttsSpeaking   = false;
    var ttsDictionary = []; // [{from, to}, ...]

    function applyTts(s) {
      var keys = ['enabled','volume','rate','pitch','readUsername','maxLength','twitch','youtube'];
      keys.forEach(function(k) { if (s[k] !== undefined) ttsSettings[k] = s[k]; });
      if (s.ttsEngine    !== undefined) ttsEngine    = s.ttsEngine;
      if (s.aivisUrl     !== undefined) aivisUrl     = s.aivisUrl;
      if (s.aivisStyleId !== undefined) aivisStyleId = s.aivisStyleId;
      if (s.bouyomiVoice !== undefined) bouyomiVoice = s.bouyomiVoice;
      try { localStorage.setItem('ttsSpeechSettings', JSON.stringify({
        settings: ttsSettings, ttsEngine: ttsEngine,
        aivisUrl: aivisUrl, aivisStyleId: aivisStyleId,
        bouyomiVoice: bouyomiVoice
      })); } catch(_) {}
    }

    function loadStoredTts() {
      try {
        var raw = localStorage.getItem('ttsSpeechSettings');
        if (!raw) return;
        var obj = JSON.parse(raw);
        // 旧フォーマット（settings キーなし）との互換
        if (obj.settings) {
          applyTts(obj.settings);
          if (obj.ttsEngine    !== undefined) ttsEngine    = obj.ttsEngine;
          if (obj.aivisUrl     !== undefined) aivisUrl     = obj.aivisUrl;
          if (obj.aivisStyleId !== undefined) aivisStyleId = obj.aivisStyleId;
          if (obj.bouyomiVoice !== undefined) bouyomiVoice = obj.bouyomiVoice;
        } else {
          applyTts(obj);
        }
      } catch(_) {}
    }

    function applyDict(entries) {
      ttsDictionary = entries || [];
      try { localStorage.setItem('ttsDictionary', JSON.stringify(ttsDictionary)); } catch(_) {}
    }

    function loadStoredDict() {
      try {
        var raw = localStorage.getItem('ttsDictionary');
        if (raw) ttsDictionary = JSON.parse(raw);
      } catch(_) {}
    }

    function applyDictionary(text) {
      var result = text;
      ttsDictionary.forEach(function(entry) {
        if (!entry.from) return;
        var re = new RegExp(entry.from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        result = result.replace(re, entry.to || '');
      });
      return result;
    }

    // ── VOICEVOX互換エンジン判定 ─────────────────────────────
    function isVoicevoxEngine(engine) {
      return engine === 'aivisspeech' || engine === 'sharevox' ||
             engine === 'lmroid'      || engine === 'itvoice';
    }

    // ── VOICEVOX互換エンジン 音声合成 ─────────────────────────
    // baseUrl: コメントごとのエンジンURL（未指定時はグローバル aivisUrl にフォールバック）
    // masterVolume: HTML Audio 要素の音量（未指定時は ttsSettings.volume）
    async function speakWithAivis(text, styleId, baseUrl, aivisParams, masterVolume) {
      var url = baseUrl || aivisUrl;
      var sid = (styleId !== undefined && styleId !== null) ? styleId : aivisStyleId;
      var ap  = aivisParams || {};
      var vol = (masterVolume !== undefined) ? masterVolume : (ttsSettings.volume || 1.0);
      console.log('[VOICEVOX] speaking:', text, 'engine:', url, 'styleId:', sid);
      try {
        var queryRes = await fetch(
          url + '/audio_query?text=' + encodeURIComponent(text) +
          '&speaker=' + sid,
          { method: 'POST' }
        );
        if (!queryRes.ok) throw new Error('audio_query failed: ' + queryRes.status);
        var query = await queryRes.json();

        // コメントごとの aivis パラメータを適用（未設定時はグローバル設定値）
        query.speedScale  = ap.speedScale  !== undefined ? ap.speedScale  : (ttsSettings.rate   || 1.0);
        query.volumeScale = ap.volumeScale !== undefined ? ap.volumeScale : (ttsSettings.volume || 1.0);
        query.pitchScale  = ap.pitchScale  !== undefined ? ap.pitchScale  : (ttsSettings.pitch ? (ttsSettings.pitch - 1.0) * 0.2 : 0.0);
        if (ap.intonationScale    !== undefined) query.intonationScale    = ap.intonationScale;
        if (ap.tempoDynamicsScale !== undefined) query.tempoDynamicsScale = ap.tempoDynamicsScale;

        var synthRes = await fetch(
          url + '/synthesis?speaker=' + sid,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(query)
          }
        );
        if (!synthRes.ok) throw new Error('synthesis failed: ' + synthRes.status);
        var blob     = await synthRes.blob();
        var audioUrl = URL.createObjectURL(blob);

        var audio = new Audio(audioUrl);
        audio.volume = vol;
        audio.onended = function() { URL.revokeObjectURL(audioUrl); processTtsQueue(); };
        audio.onerror = function() { URL.revokeObjectURL(audioUrl); processTtsQueue(); };
        audio.play();
      } catch(e) {
        console.error('AivisSpeech error:', e);
        processTtsQueue();
      }
    }

    // ── キュー処理 ───────────────────────────────────────────
    function processTtsQueue() {
      if (!ttsQueue.length) { ttsSpeaking = false; return; }
      ttsSpeaking = true;
      var item = ttsQueue.shift();
      // コメントに埋め込まれた tts 情報を使う（なければグローバル設定にフォールバック）
      var info = item.ttsInfo || {};

      var effectiveEngine    = info.engine    || ttsEngine;
      var effectiveBaseUrl   = info.baseUrl   || aivisUrl;
      var effectiveStyleId   = (info.styleId  !== undefined) ? info.styleId  : aivisStyleId;
      var effectiveBouyomiVoice = (info.bouyomiVoice !== undefined) ? info.bouyomiVoice : bouyomiVoice;

      if (effectiveEngine === 'bouyomi') {
        // 棒読みちゃんはC++経由でHTTP GETを送るだけ。棒読みちゃん自体が再生キューを管理するため即座に次へ
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type:   'bouyomi_speak',
            text:   item.text,
            voice:  effectiveBouyomiVoice,
            volume: info.bouyomiVolume !== undefined ? info.bouyomiVolume : -1,
            speed:  info.bouyomiSpeed  !== undefined ? info.bouyomiSpeed  : -1,
            tone:   info.bouyomiTone   !== undefined ? info.bouyomiTone   : -1
          }));
        }
        ttsSpeaking = false;
        setTimeout(processTtsQueue, 0);
      } else if (isVoicevoxEngine(effectiveEngine)) {
        // コメントの aivis パラメータを aivisParams 形式に変換
        var ap = {};
        if (info.aivisSpeed      !== undefined) ap.speedScale         = info.aivisSpeed;
        if (info.aivisPitch      !== undefined) ap.pitchScale         = info.aivisPitch;
        if (info.aivisIntonation !== undefined) ap.intonationScale    = info.aivisIntonation;
        if (info.aivisVolume     !== undefined) ap.volumeScale        = info.aivisVolume;
        if (info.aivisEmotion    !== undefined) ap.tempoDynamicsScale = info.aivisEmotion;
        speakWithAivis(item.text, effectiveStyleId, effectiveBaseUrl, ap, info.volume);
      } else {
        var u = new SpeechSynthesisUtterance(item.text);
        u.volume = (info.volume !== undefined) ? info.volume : ttsSettings.volume;
        u.rate   = (info.rate   !== undefined) ? info.rate   : ttsSettings.rate;
        u.pitch  = (info.pitch  !== undefined) ? info.pitch  : ttsSettings.pitch;
        u.onend = u.onerror = function() { processTtsQueue(); };
        window.speechSynthesis.speak(u);
      }
    }

    function loadUserSettings() {
      try {
        var raw = localStorage.getItem('olhUserSettings');
        return raw ? JSON.parse(raw) : {};
      } catch(_) { return {}; }
    }

    function saveUserSettings(settings) {
      try { localStorage.setItem('olhUserSettings', JSON.stringify(settings)); } catch(_) {}
    }

    function getUserSettings(user) {
      return loadUserSettings()[user] || {};
    }

    // ttsInfo: commentメッセージの "tts" オブジェクト（C++側が埋め込み済み）
    function queueTts(user, text, platform, ttsInfo) {
      if (!ttsSettings.enabled) return;
      if (platform === 'system') return;
      if (platform === 'twitch'  && !ttsSettings.twitch)  return;
      if (platform === 'youtube' && !ttsSettings.youtube) return;
      if (ttsSettings.maxLength > 0 && text.length > ttsSettings.maxLength) return;
      var info = ttsInfo || {};
      var effectiveEngine = info.engine || ttsEngine;
      if (effectiveEngine === 'webspeech' && !window.speechSynthesis) return;
      // YouTube の表示名先頭の @ は読み上げ時に除去する
      var ttsUser = (platform === 'youtube' && user.charAt(0) === '@') ? user.slice(1) : user;
      var userName    = applyDictionary(ttsUser);
      var commentText = applyDictionary(text);
      var speak = ttsSettings.readUsername ? (userName + '、' + commentText) : commentText;
      ttsQueue.push({ text: speak, ttsInfo: info });
      if (!ttsSpeaking) processTtsQueue();
    }

    var ws = null;

    function connectWs() {
      if (ws && (ws.readyState === WebSocket.CONNECTING ||
                 ws.readyState === WebSocket.OPEN)) return;

      ws = new WebSocket('ws://127.0.0.1:' + WS_PORT);
      var thisWs = ws;
      ws.onopen  = function() {};
      ws.onerror = function() { if (ws === thisWs) ws = null; };
      ws.onclose = function() { if (ws === thisWs) ws = null; };
      ws.onmessage = function(e) {
        try {
          var data = JSON.parse(e.data);
          if (data.type === 'tts') {
            applyTts(data);
          } else if (data.type === 'tts_dict') {
            applyDict(data.entries);
          } else if (data.type === 'resolve_engine_result') {
            if (data.ok) {
              var s = loadUserSettings();
              if (!s[data.userId]) s[data.userId] = {};
              s[data.userId].engine = data.engine;
              delete s[data.userId].styleId;
              delete s[data.userId].speakerName;
              delete s[data.userId].styleName;
              saveUserSettings(s);
            }
          } else if (data.type === 'resolve_model_result') {
            if (data.ok) {
              var s = loadUserSettings();
              if (!s[data.userId]) s[data.userId] = {};
              s[data.userId].styleId     = data.styleId;
              s[data.userId].speakerName = data.speakerName;
              s[data.userId].styleName   = data.styleName;
              if (data.engine) s[data.userId].engine = data.engine;
              saveUserSettings(s);
            }
          } else if (data.type === 'olh_user_settings') {
            if (data.userId) {
              var s = loadUserSettings();
              if (!s[data.userId]) s[data.userId] = {};
              if (data.aivisParams !== undefined) {
                if (Object.keys(data.aivisParams).length === 0) {
                  delete s[data.userId].aivisParams; // モデル切り替え時リセット
                } else {
                  s[data.userId].aivisParams = Object.assign(
                    s[data.userId].aivisParams || {}, data.aivisParams);
                }
              }
              if (data.webSpeechParams !== undefined) {
                var wp = data.webSpeechParams;
                if (wp.rate   !== undefined) s[data.userId].rate   = wp.rate;
                if (wp.pitch  !== undefined) s[data.userId].pitch  = wp.pitch;
                if (wp.volume !== undefined) s[data.userId].volume = wp.volume;
              }
              if (data.bouyomiParams !== undefined) {
                s[data.userId].bouyomiParams = Object.assign(
                  s[data.userId].bouyomiParams || {}, data.bouyomiParams);
              }
              saveUserSettings(s);
            }
          } else if (data.type === 'comment') {
            var text = data.text || '';
            if (text.trim().startsWith('[olh]')) return;
            var platform = ((data.platform || 'twitch') + '').toLowerCase();
            queueTts(data.user || '', text, platform, data.tts || null);
          }
        } catch(_) {}
      };
    }

    loadStoredTts();
    loadStoredDict();
    connectWs();
    setInterval(function() {
      if (!ws || ws.readyState === WebSocket.CLOSED ||
                 ws.readyState === WebSocket.CLOSING) {
        connectWs();
      }
    }, 1000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>obs-live-hub Overlay</title>
  <style>
    :root {
      --bg-color:           rgba(18, 18, 18, 0.85);
      --card-bg:            rgba(30, 30, 30, 0.90);
      --card-border:        rgba(255, 255, 255, 0.08);
      --username-color:     #e0e0e0;
      --text-color:         #ffffff;
      --font-size:          14px;
      --icon-size:          36px;
      --overlay-width:      400px;
      --overlay-height:     100vh;
      --twitch-color:       #9146FF;
      --youtube-color:      #FF0000;
      --vote-bg-color:      rgba(0, 0, 0, 0.88);
      --vote-question-color:#ffffff;
      --vote-hint-color:    #aaaaaa;
      --vote-bar-color:     #4488ff;
      --vote-bar-bg-color:  #333333;
      --vote-total-color:   #888888;
      --vote-status-color:  #44ff44;
      --vote-question-size: 15px;
      --vote-hint-size:     12px;
      --vote-result-size:   12px;
      --vote-total-size:    11px;
      --vote-status-size:   11px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
      font-size: var(--font-size);
    }

    #overlay {
      width: var(--overlay-width);
      height: var(--overlay-height);
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg-color);
      padding: 8px;
      display: flex;
      flex-direction: column;
    }

    .vote-result-label {
      font-size: var(--vote-result-size);
    }

    .vote-bar-wrap {
      background: var(--vote-bar-bg-color);
      border-radius: 3px;
      height: 8px;
      margin: 3px 0 6px;
      overflow: hidden;
    }
    .vote-bar-fill {
      background: var(--vote-bar-color);
      border-radius: 3px;
      height: 100%;
      transition: width 0.3s ease;
    }

    .comment-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      margin-bottom: 8px;
      padding: 10px 12px;
      flex-shrink: 0;
      animation: fadeIn 0.3s ease;
    }

    .comment-card.platform-twitch  { border-left: 3px solid var(--twitch-color); }
    .comment-card.platform-youtube { border-left: 3px solid var(--youtube-color); }
    .comment-card.platform-system  { border-left: 3px solid #666; opacity: 0.80; font-style: italic; }
    .platform-system .platform-badge { background: #555; color: #ccc; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .icon-wrap {
      width: var(--icon-size);
      height: var(--icon-size);
      flex-shrink: 0;
    }

    .icon-wrap svg,
    .icon-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
    }

    .username {
      color: var(--username-color);
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .platform-badge {
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      padding: 3px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    .platform-twitch  .platform-badge { background: var(--twitch-color);  color: #fff; }
    .platform-youtube .platform-badge { background: var(--youtube-color); color: #fff; }

    .comment-text {
      color: var(--text-color);
      line-height: 1.55;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #overlay::-webkit-scrollbar       { width: 4px; }
    #overlay::-webkit-scrollbar-track { background: transparent; }
    #overlay::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <div id="error-banner" style="
    display:none;
    position:fixed;bottom:0;left:0;right:0;z-index:9998;
    background:rgba(180,0,0,0.92);color:#fff;
    padding:6px 10px;font-family:monospace;font-size:12px;
    word-break:break-all;pointer-events:none;
  "></div>
  <div id="vote-panel" style="
    display:none;position:fixed;top:0;left:0;
    width:var(--overlay-width);background:var(--vote-bg-color);
    color:var(--vote-question-color);padding:10px 14px;z-index:9000;
    font-family:'Segoe UI','Yu Gothic UI',sans-serif;
  ">
    <div id="vote-question" style="font-weight:700;font-size:var(--vote-question-size);margin-bottom:6px;"></div>
    <div id="vote-hint" style="font-size:var(--vote-hint-size);color:var(--vote-hint-color);margin-bottom:8px;"></div>
    <div id="vote-bars"></div>
    <div id="vote-total" style="font-size:var(--vote-total-size);color:var(--vote-total-color);margin-top:6px;"></div>
    <div id="vote-status" style="font-size:var(--vote-status-size);color:var(--vote-status-color);margin-top:2px;">● 受付中</div>
  </div>

  <script>
    var WS_PORT          = 8765;
    let MAX_COMMENTS_LIVE = 20;

    var activeErrors = {}; // { code: message }

    function showErrorBanner() {
      var banner = document.getElementById('error-banner');
      var codes = Object.keys(activeErrors);
      if (!codes.length) {
        banner.style.display = 'none';
        return;
      }
      banner.style.display = 'block';
      banner.textContent = codes.map(function(c) {
        return '[' + c + '] ' + activeErrors[c];
      }).join(' / ');
    }

    var overlay = document.getElementById('overlay');

    var PLACEHOLDER_ICON =
      '<svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<circle cx="18" cy="18" r="18" fill="#4a4a4a"/>' +
        '<circle cx="18" cy="13" r="6" fill="#888"/>' +
        '<path d="M5 34c0-7.18 5.82-13 13-13s13 5.82 13 13" fill="#888"/>' +
      '</svg>';

    // --- ユーザーコマンド（[olh]）--------------------------------------

    function getColorLuminance(cssColor) {
      var tmp = document.createElement('div');
      tmp.style.color = cssColor;
      document.body.appendChild(tmp);
      var computed = window.getComputedStyle(tmp).color;
      document.body.removeChild(tmp);
      var m = computed.match(/\d+/g);
      if (!m || m.length < 3) return null;
      var r = parseInt(m[0]) / 255;
      var g = parseInt(m[1]) / 255;
      var b = parseInt(m[2]) / 255;
      var toLinear = function(c) { return c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); };
      return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }

    function isSafeColor(cssColor) {
      var lum = getColorLuminance(cssColor);
      if (lum === null) return false;
      return lum >= 0.15;
    }

    function isSafePanelColor(cssColor) {
      var lum = getColorLuminance(cssColor);
      if (lum === null) return false;
      return lum >= 0.05 && lum <= 0.5;
    }

    function parseOlhCommand(text) {
      var trimmed = text.trim();
      if (!trimmed.startsWith('[olh]')) return null;
      var body = trimmed.slice(5).trim();
      if (body.toLowerCase() === 'reset') return { _reset: true };
      var result = {};
      body.split(',').forEach(function(part) {
        var idx = part.indexOf(':');
        if (idx < 0) return;
        var key = part.slice(0, idx).trim();
        var val = part.slice(idx + 1).trim();
        if (key === 'color') {
          result.color = isSafeColor(val) ? val : null;
        }
        if (key === 'name') {
          result.name = isSafeColor(val) ? val : null;
        }
        if (key === 'panel') {
          result.panel = isSafePanelColor(val) ? val : null;
        }
        // WebSpeech パラメータ（overlay.html でクランプ）
        if (key === 'webs_volume') {
          var v = parseFloat(val);
          if (!isNaN(v)) result.webs_volume = Math.min(1.0, Math.max(0.0, v));
        }
        if (key === 'webs_rate') {
          var v = parseFloat(val);
          if (!isNaN(v)) result.webs_rate = Math.min(1.5, Math.max(0.7, v));
        }
        if (key === 'webs_pitch') {
          var v = parseFloat(val);
          if (!isNaN(v)) result.webs_pitch = Math.min(1.3, Math.max(0.7, v));
        }
        if (key === 'engine') {
          var eng = val.toLowerCase();
          if (eng === 'webspeech' || eng === 'web') result.engine = 'webspeech';
          else if (eng === 'aivis' || eng === 'aivisspeech') result.engine = 'aivisspeech';
        }
        if (key === 'model') {
          if (val.length > 0 && val.length <= 80) result.model = val;
        }
        // AivisSpeech パラメータ（数値チェックのみ、クランプはC++側）
        if (key === 'aivis_speed' || key === 'aivis_pitch' || key === 'aivis_intonation' ||
            key === 'aivis_volume' || key === 'aivis_emotion') {
          var v = parseFloat(val);
          if (isNaN(v)) {
            if (!result._errors) result._errors = [];
            result._errors.push(key);
          } else {
            result[key] = v;
          }
        }
      });
      return Object.keys(result).length ? result : null;
    }

    function loadUserSettings() {
      try {
        var raw = localStorage.getItem('olhUserSettings');
        return raw ? JSON.parse(raw) : {};
      } catch(_) { return {}; }
    }

    function saveUserSettings(settings) {
      try { localStorage.setItem('olhUserSettings', JSON.stringify(settings)); } catch(_) {}
    }

    function sendWs(obj) {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify(obj));
    }

    function applyOlhCommand(user, cmd) {
      if (cmd._reset) {
        var settings = loadUserSettings();
        delete settings[user];
        saveUserSettings(settings);
        return;
      }
      var settings = loadUserSettings();
      if (!settings[user]) settings[user] = {};
      if (cmd.color       !== undefined) settings[user].color  = cmd.color;
      if (cmd.name        !== undefined) settings[user].name   = cmd.name;
      if (cmd.panel       !== undefined) settings[user].panel  = cmd.panel;
      if (cmd.webs_volume !== undefined) settings[user].volume = cmd.webs_volume;
      if (cmd.webs_rate   !== undefined) settings[user].rate   = cmd.webs_rate;
      if (cmd.webs_pitch  !== undefined) settings[user].pitch  = cmd.webs_pitch;
      saveUserSettings(settings);
      // エンジン切り替え・モデル指定はプラグインに問い合わせ
      if (cmd.engine !== undefined)
        sendWs({ type: 'olh_engine_request', userId: user, engine: cmd.engine });
      if (cmd.model !== undefined)
        sendWs({ type: 'olh_model_request',  userId: user, modelName: cmd.model });
      // WebSpeech パラメータ（C++経由で broadcast → tts.html へ）
      var webSpeechMsg = { type: 'olh_webspeech_params_request', userId: user };
      var hasWebSpeech = false;
      if (cmd.webs_rate   !== undefined) { webSpeechMsg.rate   = cmd.webs_rate;   hasWebSpeech = true; }
      if (cmd.webs_pitch  !== undefined) { webSpeechMsg.pitch  = cmd.webs_pitch;  hasWebSpeech = true; }
      if (cmd.webs_volume !== undefined) { webSpeechMsg.volume = cmd.webs_volume; hasWebSpeech = true; }
      if (hasWebSpeech) sendWs(webSpeechMsg);
      // AivisSpeech パラメータ（C++ で上下限クランプ後 broadcast）
      var aivisMsg = { type: 'olh_aivis_params_request', userId: user };
      var hasAivis = false;
      if (cmd.aivis_speed      !== undefined) { aivisMsg.speed        = cmd.aivis_speed;      hasAivis = true; }
      if (cmd.aivis_pitch      !== undefined) { aivisMsg.pitch        = cmd.aivis_pitch;      hasAivis = true; }
      if (cmd.aivis_intonation !== undefined) { aivisMsg.intonation   = cmd.aivis_intonation; hasAivis = true; }
      if (cmd.aivis_volume     !== undefined) { aivisMsg.volume_scale = cmd.aivis_volume;     hasAivis = true; }
      if (cmd.aivis_emotion    !== undefined) { aivisMsg.emotion      = cmd.aivis_emotion;    hasAivis = true; }
      if (hasAivis) sendWs(aivisMsg);
      // 数値不正エラーをシステムコメントで表示
      if (cmd._errors && cmd._errors.length > 0) {
        cmd._errors.forEach(function(key) {
          addComment({ user: 'obs-live-hub',
            text: user + 'さんへ：' + key + ' には数値を指定してください。',
            platform: 'system' });
        });
      }
    }

    function getUserSettings(user) {
      var settings = loadUserSettings();
      return settings[user] || {};
    }

    // --- アンケートパネル -----------------------------------------------

    function showVotePanel(data) {
      var panel = document.getElementById('vote-panel');
      document.getElementById('vote-question').textContent = data.question || '';
      var hint = '';
      if (data.mode === 'choice' && data.choices && data.choices.length) {
        hint = data.choices.map(function(c) {
          return '!vote ' + c.key + ' = ' + c.label;
        }).join('  |  ');
      } else {
        hint = '!vote <回答> でコメント';
      }
      document.getElementById('vote-hint').textContent = hint;
      document.getElementById('vote-bars').innerHTML = '';
      document.getElementById('vote-total').textContent = '投票数: 0票';
      var st = document.getElementById('vote-status');
      st.textContent = '● 受付中';
      st.style.color = '';
      panel.style.display = 'block';
    }

    function updateVotePanel(data) {
      var panel = document.getElementById('vote-panel');
      if (panel.style.display === 'none') return;
      document.getElementById('vote-total').textContent =
        '投票数: ' + (data.total || 0) + '票';
      var barsEl = document.getElementById('vote-bars');
      barsEl.innerHTML = '';
      var results = data.results || [];
      results.forEach(function(r) {
        var row = document.createElement('div');
        row.style.marginBottom = '6px';
        var info = document.createElement('div');
        info.style.cssText = 'display:flex;justify-content:space-between;margin-bottom:2px;';
        var nameEl = document.createElement('span');
        nameEl.className = 'vote-result-label';
        nameEl.textContent = (r.key ? r.key + ': ' : '') + (r.label || '');
        var cntEl = document.createElement('span');
        cntEl.className = 'vote-result-label';
        cntEl.style.color = '#aaa';
        cntEl.textContent = r.count + '票 ' + parseFloat(r.percent || 0).toFixed(1) + '%';
        info.appendChild(nameEl);
        info.appendChild(cntEl);
        var barTrack = document.createElement('div');
        barTrack.className = 'vote-bar-wrap';
        var barFill = document.createElement('div');
        barFill.className = 'vote-bar-fill';
        barFill.style.width = parseFloat(r.percent || 0).toFixed(1) + '%';
        barTrack.appendChild(barFill);
        row.appendChild(info);
        row.appendChild(barTrack);
        barsEl.appendChild(row);
      });
    }

    function endVotePanel(data) {
      var panel = document.getElementById('vote-panel');
      if (panel.style.display === 'none') return;
      var st = document.getElementById('vote-status');
      st.textContent = '■ 受付終了';
      st.style.color = '#f44';
      document.getElementById('vote-total').style.color = '';
      if (data) updateVotePanel(data);
      setTimeout(function() { panel.style.display = 'none'; }, 30000);
    }

    // --- デバッグトースト（接続・スタイル受信の確認用）-------------------

    function showDebugToast(text, color, durationMs) {
      var t = document.createElement('div');
      t.style.cssText =
        'position:fixed;top:0;left:0;right:0;z-index:9999;padding:4px 8px;' +
        'font-family:monospace;font-size:11px;word-break:break-all;' +
        'pointer-events:none;' +
        'background:' + (color || 'rgba(0,160,0,0.88)') + ';color:#fff;';
      t.textContent = text;
      document.body.appendChild(t);
      var ms = (durationMs === undefined) ? 4000 : durationMs;
      if (ms > 0)
        setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, ms);
    }

    // --- スタイル適用 ---------------------------------------------------

    function hexToRgba(hex, opacity) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + opacity + ')';
    }

    function applyStyle(s) {
      const root = document.documentElement.style;

      if (s.overlayWidth !== undefined)
        root.setProperty('--overlay-width', s.overlayWidth + 'px');
      if (s.bgColor !== undefined && s.bgOpacity !== undefined)
        root.setProperty('--bg-color', hexToRgba(s.bgColor, s.bgOpacity));
      if (s.cardBgColor !== undefined && s.cardOpacity !== undefined)
        root.setProperty('--card-bg', hexToRgba(s.cardBgColor, s.cardOpacity));
      if (s.cardBorderColor !== undefined && s.cardBorderOpacity !== undefined)
        root.setProperty('--card-border', hexToRgba(s.cardBorderColor, s.cardBorderOpacity));
      if (s.usernameColor !== undefined)
        root.setProperty('--username-color', s.usernameColor);
      if (s.textColor !== undefined)
        root.setProperty('--text-color', s.textColor);
      if (s.fontSize !== undefined)
        root.setProperty('--font-size', s.fontSize + 'px');
      if (s.iconSize !== undefined)
        root.setProperty('--icon-size', s.iconSize + 'px');
      if (s.maxComments !== undefined)
        MAX_COMMENTS_LIVE = s.maxComments;
      if (s.overlayHeight !== undefined)
        root.setProperty('--overlay-height',
          s.overlayHeight === 0 ? '100vh' : s.overlayHeight + 'px');
      if (s.voteBgColor !== undefined && s.voteBgOpacity !== undefined)
        root.setProperty('--vote-bg-color', hexToRgba(s.voteBgColor, s.voteBgOpacity));
      if (s.voteQuestionColor !== undefined)
        root.setProperty('--vote-question-color', s.voteQuestionColor);
      if (s.voteHintColor !== undefined)
        root.setProperty('--vote-hint-color', s.voteHintColor);
      if (s.voteBarColor !== undefined)
        root.setProperty('--vote-bar-color', s.voteBarColor);
      if (s.voteBarBgColor !== undefined)
        root.setProperty('--vote-bar-bg-color', s.voteBarBgColor);
      if (s.voteTotalColor !== undefined)
        root.setProperty('--vote-total-color', s.voteTotalColor);
      if (s.voteStatusColor !== undefined)
        root.setProperty('--vote-status-color', s.voteStatusColor);
      if (s.voteQuestionSize !== undefined)
        root.setProperty('--vote-question-size', s.voteQuestionSize + 'px');
      if (s.voteHintSize !== undefined)
        root.setProperty('--vote-hint-size', s.voteHintSize + 'px');
      if (s.voteResultSize !== undefined)
        root.setProperty('--vote-result-size', s.voteResultSize + 'px');
      if (s.voteTotalSize !== undefined)
        root.setProperty('--vote-total-size', s.voteTotalSize + 'px');
      if (s.voteStatusSize !== undefined)
        root.setProperty('--vote-status-size', s.voteStatusSize + 'px');

      try { localStorage.setItem('overlayStyle', JSON.stringify(s)); } catch (_) {}
    }

    function loadStoredStyle() {
      try {
        var raw = localStorage.getItem('overlayStyle');
        if (raw) applyStyle(JSON.parse(raw));
      } catch (_) {}
    }

    // --- WebSocket 接続 -------------------------------------------------

    var ws = null;

    function connectWs() {
      if (ws && (ws.readyState === WebSocket.CONNECTING ||
                 ws.readyState === WebSocket.OPEN)) return;

      ws = new WebSocket('ws://127.0.0.1:' + WS_PORT);
      var thisWs = ws;

      ws.onopen = function() {
        showDebugToast('[debug] WebSocket connected :' + WS_PORT);
      };
      ws.onerror = function() {
        showDebugToast('[debug] WebSocket error', 'rgba(180,0,0,0.88)');
        if (ws === thisWs) ws = null;
      };
      ws.onclose = function() {
        if (ws === thisWs) ws = null;
      };
      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'style') {
            applyStyle(data);
            showDebugToast('[debug] style applied: bg=' + (data.bgColor || '?') +
                           ' opacity=' + (data.bgOpacity !== undefined ? data.bgOpacity : '?'));
          } else if (data.type === 'quota_warning') {
            showDebugToast('⚠️ YouTube クォータ残り約' + data.remainingMinutes + '分',
                           'rgba(180,140,0,0.92)', 10000);
          } else if (data.type === 'quota_exceeded') {
            showDebugToast('🛑 YouTube クォータ超過 - コメント取得を停止しました',
                           'rgba(200,0,0,0.92)', 0);
          } else if (data.type === 'error') {
            activeErrors[data.code] = data.message;
            showErrorBanner();
          } else if (data.type === 'error_clear') {
            delete activeErrors[data.code];
            showErrorBanner();
          } else if (data.type === 'resolve_engine_result') {
            if (data.ok) {
              var s = loadUserSettings();
              if (!s[data.userId]) s[data.userId] = {};
              s[data.userId].engine = data.engine;
              saveUserSettings(s);
            }
          } else if (data.type === 'resolve_model_result') {
            if (data.ok) {
              var s = loadUserSettings();
              if (!s[data.userId]) s[data.userId] = {};
              s[data.userId].styleId     = data.styleId;
              s[data.userId].speakerName = data.speakerName;
              s[data.userId].styleName   = data.styleName;
              if (data.engine) s[data.userId].engine = data.engine;
              saveUserSettings(s);
            }
          } else if (data.type === 'comment') {
            addComment(data);
          } else if (data.type === 'vote_start') {
            showVotePanel(data);
          } else if (data.type === 'vote_update') {
            updateVotePanel(data);
          } else if (data.type === 'vote_end') {
            endVotePanel(data);
          }
        } catch (err) {
          showDebugToast('[debug] parse error: ' + err, 'rgba(180,60,0,0.88)');
        }
      };
    }

    // --- コメントカードを追加 -------------------------------------------

    function addComment(data) {
      if (!data.user && !data.text) return;

      var platform = ((data.platform || 'twitch') + '').toLowerCase();

      // [olh] コマンドはシステムコメント以外でのみ処理
      if (platform !== 'system') {
        var cmd = parseOlhCommand(data.text || '');
        if (cmd) {
          applyOlhCommand(data.user, cmd);
          return;
        }
      }

      var badgeLabel = platform === 'youtube' ? 'YouTube'
                     : platform === 'system'  ? 'OBS'
                     : 'Twitch';

      var iconWrap = document.createElement('div');
      iconWrap.className = 'icon-wrap';
      if (data.avatar) {
        var img = document.createElement('img');
        img.src = data.avatar;
        img.alt = '';
        iconWrap.appendChild(img);
      } else {
        iconWrap.innerHTML = PLACEHOLDER_ICON;
      }

      var usernameEl = document.createElement('span');
      usernameEl.className = 'username';
      usernameEl.textContent = data.user || '';

      var badge = document.createElement('span');
      badge.className = 'platform-badge';
      badge.textContent = badgeLabel;

      var header = document.createElement('div');
      header.className = 'card-header';
      header.appendChild(iconWrap);
      header.appendChild(usernameEl);
      header.appendChild(badge);

      var commentEl = document.createElement('div');
      commentEl.className = 'comment-text';
      commentEl.textContent = data.text || '';
      var userCfg = getUserSettings(data.user);
      if (userCfg.color) commentEl.style.color = userCfg.color;
      if (userCfg.name)  usernameEl.style.color = userCfg.name;

      var card = document.createElement('div');
      card.className = 'comment-card platform-' + platform;
      if (userCfg.panel) card.style.background = userCfg.panel;
      card.appendChild(header);
      card.appendChild(commentEl);

      overlay.appendChild(card);

      while (overlay.children.length > MAX_COMMENTS_LIVE)
        overlay.removeChild(overlay.firstChild);

      overlay.scrollTop = overlay.scrollHeight;
    }

    loadStoredStyle();
    connectWs();
    setInterval(function() {
      if (!ws || ws.readyState === WebSocket.CLOSED ||
                 ws.readyState === WebSocket.CLOSING) {
        connectWs();
      }
    }, 1000);
  </script>
</body>
</html>
